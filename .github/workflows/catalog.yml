name: Validate and release catalogue

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - name: Build release archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run release
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "pip-coaching-kit-$GITHUB_REF_NAME.tar.gz" SHA256SUMS --generate-notes --verify-tag
